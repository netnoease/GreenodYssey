name: Make Me Green

on:
  schedule:
    # 每天 UTC 时间 16:00 运行
    # 对应北京时间 00:00 (午夜)
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  paint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # 已更新到 v5 以解决 Node.js 20 报错
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Green Script
        run: |
          # 修改点：这里改成了你的文件名 green.sh
          chmod +x green.sh
          ./green.sh
